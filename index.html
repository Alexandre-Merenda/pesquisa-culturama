<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <!--
        Action = recebe uma URL de destino dos dados
        Method = forma de envio dos dados
        -->
        <form action="" method="get">
            <fieldset>
                <legend>Dados pessoais</legend>
                <label for="userName">Nome</label>
                <input type="text" name="userName" required>
                
                <label for="userAge">Idade</label>
                <input type="number" name="userAge" min="12" max="100" required>

                <label for="birthDate">Data de nascimento</label>
                <input type="date" name="birthDate">

                <label for="userEmail">Email</label>
                <input type="email" name="userEmail" required>

                <label for="userPhoneNumber">Telefone</label>
                <input type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD+número sem espaço ou hífen">
                <br>
                <label for="userImage">Upload de foto</label>
                <input type="file" accept="image/*" name="userImage">

            </fieldset>

            <fieldset>
                <legend>Perfil</legend>

                <input type="radio" name="userGender" value="Feminino">
                <label for="userGender">Feminino</label>

                <input type="radio" name="userGender" value="Masculino">
                <label for="userGender">Masculino</label>

                <input type="radio" name="userGender" value="Não-Binário">
                <label for="userGender">Não-Binário</label>

                <input type="radio" name="userGender" value="NãoInformado">
                <label for="userGender">Prefiro não informar</label>
                <br>

                <label for="userMaritalStatus">Estado Civil</label>
                <select name="userMaritalStatus">
                    <option value="notInformed">Selecione...</option>
                    <option value="casado">Casado</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="uniaoEstavel">União Estável</option>
                </select>

                <label for="userState">Estado</label>
                <select name="userState" required>
                    <option value="">Selecione...</option>
                    <option value="Acre">AC</option>
                    <option value="Alagoas">AL</option>
                    <option value="Amapá">AP</option>
                    <option value="Amazonas">AM</option>
                    <option value="Bahia">BA</option>
                    <option value="Ceará">CE</option>
                    <option value="Distrito Federal">DF</option>
                    <option value="Espirito Santo">ES</option>
                    <option value="Goiás">GO</option>
                    <option value="Maranhão">MA</option>
                    <option value="Mato Grosso do Sul">MS</opti=on>
                    <option value="Mato Grosso">MT</option>
                    <option value="Minas Gerais">MG</option>
                    <option value="Pará">PA</option>
                    <option value="Paraíba">PB</option>
                    <option value="Paraná">PR</option>
                    <option value="Pernambuco">PE</option>
                    <option value="Piauí">PI</option>
                    <option value="Rio de Janeiro">RJ</option>
                    <option value="Rio Grande do Norte">RN</op=tion>
                    <option value="Rio Grande do Sul">RS</option>
                    <option value="Rondônia">RO</option>
                    <option value="Roraima">RR</option>
                    <option value="Santa Catarina">SC</option>
                    <option value="São Paulo">SP</option>
                    <option value="Sergipe">SE</option>
                    <option value="Tocantins">TO</option>
                </select>
                <br>
                <label for="userCity">Cidade</label>
                <input type="text" name="userCity">
            </fieldset>

            <button type="submit">Enviar</button>
        </form>
    </section>
</body>
</html>
