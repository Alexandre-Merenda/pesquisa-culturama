<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="culturama-favico.png">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <img src="img/logo-culturama.png" alt="logo culturama">
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <!--
        Action = recebe uma URL de destino dos dados
        Method = forma de envio dos dados
        -->
        <form action="" method="get">
            <fieldset>
                <legend>Dados pessoais</legend>
                <label for="name">Nome</label>
                <input id="name" type="text" name="userName" required>
                
                <label for="age">Idade</label>
                <input id="age" type="number" name="userAge" min="12" max="100" required>

                <label for="birthDate">Data de nascimento</label>
                <input id="birthDate" type="date" name="userBirthDate">

                <label for="email">Email</label>
                <input id="email" type="email" name="userEmail" required>

                <label for="phoneNumber">Telefone</label>
                <input id="phoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD+número sem espaço ou hífen">
                <br>
                <label for="image">Upload de foto</label>
                <input id="image" type="file" accept="image/*" name="userImage">

            </fieldset>

            <fieldset>
                <legend>Perfil</legend>

                <input id="fem" type="radio" name="userGender" value="Feminino">
                <label for="fem">Feminino</label>

                <input id="masc" type="radio" name="userGender" value="Masculino">
                <label for="masc">Masculino</label>

                <input id="nb" type="radio" name="userGender" value="naoBinario">
                <label for="nb">Não-Binário</label>

                <input id="notInformed" type="radio" name="userGender" value="NãoInformado">
                <label for="notInformed">Prefiro não informar</label>
                <br>

                <label for="maritalStatus">Estado Civil</label>
                <select id="maritalStatus" name="userMaritalStatus">
                    <option value="notInformed">Selecione...</option>
                    <option value="casado">Casado</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="uniaoEstavel">União Estável</option>
                </select>

                <label for="state">Estado</label>
                <select id="state" name="userState" required>
                    <!-- Usar ctrl+shift+P para transformar tudo em 'Camel case por exemplo' -->
                    <option value="">Selecione...</option>
                    <option value="acre">AC</option>
                    <option value="alagoas">AL</option>
                    <option value="amapa">AP</option>
                    <option value="amazonas">AM</option>
                    <option value="bahia">BA</option>
                    <option value="ceara">CE</option>
                    <option value="distritoFederal">DF</option>
                    <option value="espiritoSanto">ES</option>
                    <option value="goias">GO</option>
                    <option value="maranhao">MA</option>
                    <option value="matoGrossoDoSul">MS</opti=on>
                    <option value="matoGrosso">MT</option>
                    <option value="minasGerais">MG</option>
                    <option value="para">PA</option>
                    <option value="paraiba">PB</option>
                    <option value="parana">PR</option>
                    <option value="pernambuco">PE</option>
                    <option value="piaui">PI</option>
                    <option value="rioDeJaneiro">RJ</option>
                    <option value="rioGrandeDoNorte">RN</op=tion>
                    <option value="rioGrandeDoSul">RS</option>
                    <option value="rondonia">RO</option>
                    <option value="roraima">RR</option>
                    <option value="santaCatarina">SC</option>
                    <option value="saoPaulo">SP</option>
                    <option value="sergipe">SE</option>
                    <option value="tocantins">TO</option>
                </select>
                <br>
                <label for="city">Cidade</label>
                <input id="city" type="text" name="userCity">
            </fieldset>

            <fieldset>
                <legend>Hábitos</legend>

                <p>Redes Sociais</p>
                <input id="instagram" type="checkbox" name="social" value="instagram">
                <label for="instagram">Instagram</label>
                <br>
                <input id="facebook" type="checkbox" name="social" value="facebook">
                <label for="facebook">Facebook</label>
                <br>
                <input id="linkedin" type="checkbox" name="social" value="linkedin">
                <label for="linkedin">LinkedIn</label>
                <br>
                <input id="x" type="checkbox" name="social" value="x">
                <label for="x">X(Twitter)</label>
                <br>
                <label for="musicStyle">Estilo musical</label>
                <input list="styleList" id="musicStyle" name="userMusicStyle" type="text">
                <datalist id="styleList">
                    <option value="Rock">
                    <option value="Pop">
                    <option value="Funk">
                    <option value="Samba">
                </datalist>
                <br>
                <label for="favoriteColor">Cor preferida</label>
                <input type="color" name="userFavoriteColor" id="favoriteColor">
            </fieldset>

            <fieldset>
                <legend>Opnião</legend>
            <p>Qual a sua satisfação com o serviço?</p>
                <input id="great" name="userSatisfaction" type="radio" value="great">
                <label for="great">Ótima</label>
                <br>
                <input id="good" name="userSatisfaction" type="radio" value="good">
                <label for="good">Boa</label>
                <br>
                <input id="regular" name="userSatisfaction" type="radio" value="regular">
                <label for="regular">Regular</label>
                <br>
                <input id="bad" name="userSatisfaction" type="radio" value="bad">
                <label for="bad">Ruim</label>
                <br><br>
                <label for="comment">Faça um comentário:</label>
                <br>
                <textarea name="userComment" id="comment" placeholder="Digite aqui sua opnião..."></textarea>

            </fieldset>

            <fieldset>
                <legend>Confirmações</legend>

                <input type="checkbox" name="userLgpd" id="lgpdTerm" value="accepted" required>
                <label for="lgpdTerm">Eu aceito participar da pesquisa</label>
                <br>
                <input type="checkbox" name="userGetResult" id="getResult" value="accepted">
                <label for="getResult">Desejo receber o resultado por email</label>
            </fieldset>

            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>
    </section>
</body>
</html>
